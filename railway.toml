# Railway deployment config for Trackam
# Deploys two services (backend + frontend) against a Railway-managed Postgres database.
#
# One-click deploy URL:
#   https://railway.app/new?template=https://github.com/YOUR_USERNAME/trackam
#
# First-deploy checklist (run in backend service shell after deploy):
#   npm run db:migrate
#   npm run db:seed:bootstrap-admin

[deploy]
numReplicas = 1
sleepApplication = false

# ── Backend ───────────────────────────────────────────────────────────────────

[[services]]
name = "backend"
source = "backend"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30

[services.variables]
PORT = "8080"
SESSION_COOKIE_SECURE = "true"
SESSION_COOKIE_MAX_AGE_DAYS = "7"
JWT_EXPIRATION_SECONDS = "3600"
RATE_LIMIT_WINDOW_MS = "60000"
RATE_LIMIT_MAX_REQUESTS = "60"
STORAGE_DIRECTORY = "storage"

# These must be set manually in the Railway dashboard:
#   DATABASE_URL        (auto-set if you attach the Railway Postgres plugin)
#   JWT_SECRET          (generate: openssl rand -hex 32)
#   FRONTEND_URL        (https://<your-frontend>.up.railway.app)
#   STORAGE_URL_PREFIX  (https://<your-backend>.up.railway.app/storage)
#   BOOTSTRAP_ADMIN_EMAIL
#   BOOTSTRAP_ADMIN_PASSWORD

# ── Frontend ──────────────────────────────────────────────────────────────────

[[services]]
name = "frontend"
source = "frontend"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "sh -c 'node scripts/writeRuntimeConfig.mjs dist/runtime-config.js && serve -s dist -l ${PORT:-3000}'"
healthcheckPath = "/"
healthcheckTimeout = 30

[services.variables]
PORT = "3000"

# Must be set manually in the Railway dashboard:
#   VITE_API_URL  (https://<your-backend>.up.railway.app)
#
# Note: VITE_API_URL is injected at container start (not build time) via
# writeRuntimeConfig.mjs, so no rebuild is needed when the backend URL changes.
